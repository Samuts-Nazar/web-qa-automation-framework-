name: Playwright Automated Tests

# Тригери запуску: при пуші або створенні Pull Request у гілку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    # 1. Завантаження коду з репозиторію
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Налаштування середовища Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Встановлення залежностей проєкту
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Встановлення браузерів Playwright та їхніх системних залежностей
    - name: Install Playwright Browsers
      run: playwright install --with-deps

    # 5. Запуск тестів із генерацією сирих результатів Allure
    - name: Run pytest
      run: pytest --alluredir=allure-results
      
    # 6. Збереження результатів тестування (артефактів), навіть якщо тести впали
    - name: Upload Allure results artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results
        retention-days: 15